{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4 p-4 text-center">
                <h2 class="fw-bold mb-4">Удаление контента</h2>
                <p class="lead mb-4">Вы уверены, что хотите навсегда удалить <strong>"{{ object.title }}"</strong>? Это действие нельзя отменить.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-3 justify-content-center">
                        <a href="{{ object.get_absolute_url }}" class="btn btn-light px-4 rounded-pill">Отмена</a>
                        <button type="submit" class="btn btn-danger px-4 rounded-pill fw-bold">Да, удалить всё</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
