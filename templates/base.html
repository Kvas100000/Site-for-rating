<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RATE.IT{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            border-bottom: 2px solid #ffc107;
        }
        .navbar-brand {
            font-weight: 800;
            letter-spacing: 1px;
        }
        .user-avatar {
            width: 35px;
            height: 35px;
            background-color: #ffc107;
            color: #212529;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 10px;
        }
        .main-container {
            min-height: 85vh;
            padding-bottom: 50px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm mb-5">
    <div class="container">
        <a class="navbar-brand fs-3" href="{% url 'main:home' %}">
            <span class="text-warning">RATE</span>.IT
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">

            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <div class="d-flex align-items-center me-4">
                        <div class="user-avatar">
                            {{ user.username|slice:":1"|upper }}
                        </div>
                        <span class="text-white fw-bold fs-5">{{ user.username }}</span>
                    </div>

                    <form action="{% url 'auth_system:logout' %}" method="post" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">
                            <i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Выйти
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'auth_system:login' %}" class="btn btn-link text-white text-decoration-none me-2">Войти</a>
                    <a href="{% url 'auth_system:signup' %}" class="btn btn-warning fw-bold rounded-pill px-4 shadow-sm">
                        Регистрация
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<div class="container main-container">
    {% block content %}
    {% endblock %}
</div>

<footer class="bg-dark text-white-50 py-4 mt-auto">
    <div class="container text-center">
        <small>&copy; 2026 RATE.IT — Твой гид в мире контента</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
